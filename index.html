<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Image Bracket Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <h1>Image Bracket Generator</h1>

    <section class="input-section">
      <h2>Add Players</h2>
      <form id="player-form">
        <div class="form-row">
          <label>Player Name</label>
          <input type="text" id="player-name" required />
        </div>
        <div class="form-row">
          <label>Image URL</label>
          <input type="url" id="player-image" placeholder="https://example.com/image.jpg" required />
        </div>
        <button type="submit">Add Player</button>
      </form>

      <div class="player-list-container">
        <h3>Players</h3>
        <ul id="player-list"></ul>
      </div>

      <button id="generate-bracket" class="generate-btn">Generate Bracket</button>
    </section>

    <section class="bracket-section">
      <h2>Bracket</h2>
      <div id="bracket-container"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
