<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BracketHQ‑Style Image Bracket</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sidebar">
    <h2>Bracket Information</h2>
    <label>Bracket Name</label>
    <input id="bracketName" type="text" placeholder="Tournament Name" />
    <label>Bracket Type</label>
    <input value="Single Elimination" disabled />
    <label>Game</label>
    <input id="gameName" type="text" placeholder="Game Title" />
    <label>Description</label>
    <textarea id="bracketDesc"></textarea>

    <h3>Add Players</h3>
    <form id="playerForm">
      <input id="playerName" type="text" placeholder="Player Name" required />
      <input id="playerImage" type="file" accept="image/*" required />
      <button type="submit">Add Player</button>
    </form>

    <button id="generateBracket">Generate Bracket</button>
  </div>

  <div class="main">
    <h1 id="bracketTitle">Bracket</h1>
    <div id="bracketContainer"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
